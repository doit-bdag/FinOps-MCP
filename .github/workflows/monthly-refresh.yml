name: Monthly Data Refresh

on:
  schedule:
    # Run at 06:00 UTC on the 1st of every month
    - cron: '0 6 1 * *'
  workflow_dispatch:
    # Allow manual triggers from the GitHub UI

permissions:
  contents: read
  id-token: write  # Required for Workload Identity Federation

env:
  PYTHON_VERSION: '3.11'

jobs:
  refresh:
    name: Refresh FinOps Data
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_WIF_PROVIDER: ${{ secrets.GCP_WIF_PROVIDER }}
      GCP_SA_EMAIL: ${{ secrets.GCP_SA_EMAIL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright browsers (for crawl4ai)
        run: uv run playwright install --with-deps chromium

      - name: Run monthly refresh
        env:
          GCP_PROJECT_ID: ${{ env.GCP_PROJECT_ID }}
          GCP_LOCATION: us-west1
          FIRESTORE_DATABASE: finops-mcp
          FIRESTORE_COLLECTION: finops_chunks
          FIRESTORE_FOCUS_COLLECTION: finops_focus_columns
          FIRESTORE_TERMS_COLLECTION: finops_terms
          CRAWL_MAX_DEPTH: "2"
          CRAWL_MAX_PAGES: "30"
        run: |
          uv run python scripts/refresh_all.py 2>&1 | tee refresh_output.log

      - name: Post job summary
        if: always()
        run: |
          echo "## 📊 Monthly Data Refresh Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -10 refresh_output.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Run**: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
