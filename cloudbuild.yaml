steps:
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - run
      - deploy
      - finops-mcp
      - --source=.
      - --region=us-west1
      - --platform=managed
      - --service-account=finops-mcp-sa@$PROJECT_ID.iam.gserviceaccount.com
      - --allow-unauthenticated
      - --set-env-vars=MCP_TRANSPORT=sse,GCP_PROJECT_ID=$PROJECT_ID,GCP_LOCATION=us-west1,FIRESTORE_COLLECTION=finops_chunks
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --timeout=300
options:
  logging: CLOUD_LOGGING_ONLY
